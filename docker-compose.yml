services:
  postgres:
    container_name: hrms_postgres
    build: ./seed-data/postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hrms_dontuse
    ports:
      - '5438:5432'
    volumes:
      - hrms_postgres_data:/var/lib/postgresql/data

  postgres-seed:
    container_name: hrms_postgres_seed
    image: postgres:17
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - ./seed-data/postgres/seed-currency.sql:/seed-currency.sql:ro
    entrypoint: >
      /bin/sh -c "
        echo 'Waiting for postgres...';
        until pg_isready -h postgres -U postgres; do sleep 1; done;
        echo 'Seeding currency data...';
        PGPASSWORD=password psql -h postgres -U postgres -d hrms_db -f /seed-currency.sql 2>/dev/null || echo 'Seed skipped (table may not exist yet - run migrations first)';
        echo 'Done.';
      "
    restart: 'no'

  mailcrab:
    container_name: hrms_mailcrab
    image: marlonb/mailcrab
    ports:
      - '1082:1080'
      - '1027:1025'

  minio:
    container_name: hrms_minio
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    ports:
      - '9002:9000'
      - '9003:9001'
    volumes:
      - hrms_minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    container_name: hrms_minio_init
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/hrms --ignore-existing;
        mc anonymous set download local/hrms;
        echo 'MinIO bucket ready';
      "
    restart: 'no'

volumes:
  hrms_postgres_data:
  hrms_minio_data:
